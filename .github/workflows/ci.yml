name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install package
        run: python -m pip install -e .

      # studio_engine.certify composes the coherence-membrane spine (an internal
      # peer flagship, not a third-party dep and not published to PyPI). engine.py
      # imports certify eagerly, so the whole package needs the spine at import
      # time; install it from source so the suite can import studio_engine.
      - name: Install coherence-membrane spine
        run: python -m pip install "git+https://github.com/HarperZ9/coherence-membrane.git"

      - name: Run Python tests
        run: python -m unittest discover -s tests

      - name: Run browser logic tests
        run: node --test showcase/tests/*.test.mjs

      - name: Run delivery contract
        run: python test_forward_delivery_contract.py
