<!doctype html>
<!--
  studio-engine — reference experience chamber (single file, zero build, zero deps).

  RUN:
    1. python -m studio_engine.server 8777      (from the repo root)
    2. open this file in a browser (file:// is fine; CORS is open on the server).

  WHAT IT PROVES (manual verification checklist):
    [ ] Load a gallery World, or POST /simulate — a field generator (e.g. gyroid) RENDERS LIVE
        in WebGL by compiling the shipped render_program.source VERBATIM, and BREATHES as u_time
        animates over [0, period). (This is the engine's verified math, not a re-derivation.)
    [ ] A point generator (phyllotaxis/attractor/harmonograph) draws from its recipe on Canvas2D.
    [ ] "▶ audio" synthesizes the audio_program (oscillators + pitch sweep) via Web Audio.
    [ ] "composite" stacks two blended layers (field behind, points in front) from /compose.
    [ ] The reasoning panel shows per-axis margins, the timeline continuity/on-criterion verdicts,
        and the receipt (id, seed, final_score, expr_sha256s) — every frame accountable.

  This is the reference consumer. The native GPU renderer is a separate project (raw); here the
  browser compiles the shipped shader. Every frame is grounded and reproducible.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>studio-engine · experience chamber</title>
<style>
  :root{
    --bg:#0b0e13; --panel:#12161e; --line:#222a36; --ink:#e8ecf4; --dim:#8893a7;
    --a:#2dd4bf; --b:#7a5cff; --c:#fbbf24;
    --font:'Segoe UI',system-ui,sans-serif; --mono:'SFMono-Regular',Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 70% -10%,#161b26,#0b0e13 60%);
       color:var(--ink);font-family:var(--font);min-height:100vh}
  header{display:flex;gap:14px;align-items:center;flex-wrap:wrap;padding:14px 20px;
         border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(11,14,19,.85);
         backdrop-filter:blur(8px);z-index:5}
  h1{font-size:16px;font-weight:600;margin:0;letter-spacing:.5px}
  h1 small{color:var(--dim);font-weight:400}
  .grow{flex:1}
  input,select,button{font:inherit;color:var(--ink);background:#0e131b;border:1px solid var(--line);
       border-radius:8px;padding:7px 10px}
  input[type=number]{width:74px}
  button{cursor:pointer;background:linear-gradient(180deg,#1b2433,#141b27);transition:.15s}
  button:hover{border-color:var(--a);color:#fff}
  button.primary{background:linear-gradient(180deg,var(--a),#1aa896);color:#06231f;border:none;font-weight:600}
  main{display:grid;grid-template-columns:1fr 360px;gap:18px;padding:18px 20px}
  @media(max-width:900px){main{grid-template-columns:1fr}}
  .stage{position:relative;aspect-ratio:1/1;width:100%;background:#06080c;border:1px solid var(--line);
         border-radius:14px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .stage canvas,.stage .svgwrap{position:absolute;inset:0;width:100%;height:100%;display:block}
  .stage .badge{position:absolute;left:12px;top:12px;font:12px/1 var(--mono);color:var(--dim);
       background:rgba(0,0,0,.45);padding:6px 9px;border-radius:7px;border:1px solid var(--line);z-index:2}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:16px}
  .panel h2{font-size:12px;text-transform:uppercase;letter-spacing:1.2px;color:var(--dim);margin:0 0 12px}
  .swatches{display:flex;gap:6px;margin:10px 0}
  .swatches i{flex:1;height:18px;border-radius:5px}
  .axis{display:flex;align-items:center;gap:8px;margin:5px 0;font:12px/1 var(--mono)}
  .axis .name{width:96px;color:var(--dim)}
  .axis .bar{flex:1;height:9px;background:#0c1118;border-radius:5px;overflow:hidden}
  .axis .fill{height:100%;background:linear-gradient(90deg,var(--b),var(--a))}
  .axis.weak .fill{background:linear-gradient(90deg,#ff5c7a,var(--c))}
  .axis .val{width:42px;text-align:right}
  .tag{padding:2px 7px;border-radius:6px;font-size:11px}
  .tag.verified{background:#0c3b2e;color:#43e0b0}
  .tag.unverifiable{background:#3a3410;color:#e8c64a}
  .tag.refuted{background:#3d1620;color:#ff7a93}
  .receipt{font:11px/1.6 var(--mono);color:var(--dim);word-break:break-all}
  .gallery{display:flex;gap:10px;overflow-x:auto;padding:4px 20px 20px}
  .card{flex:0 0 132px;border:1px solid var(--line);border-radius:10px;padding:10px;cursor:pointer;
        background:var(--panel);transition:.15s}
  .card:hover{border-color:var(--a);transform:translateY(-2px)}
  .card .t{font-size:12px;font-weight:600;margin-bottom:6px}
  .card .m{font:10px/1.4 var(--mono);color:var(--dim)}
  .card .strip{display:flex;height:8px;border-radius:4px;overflow:hidden;margin-top:8px}
  .card .strip i{flex:1}
  #log{font:11px/1.5 var(--mono);color:var(--dim);white-space:pre-wrap;max-height:120px;overflow:auto}
  .err{color:#ff7a93}
</style>
</head>
<body>
<header>
  <h1>studio-engine <small>· experience chamber</small></h1>
  <span class="grow"></span>
  <input id="base" value="http://127.0.0.1:8777" size="22" title="API base URL">
  <input id="seed" type="number" value="7" title="seed">
  <select id="gen" title="generator"></select>
  <select id="scheme" title="scheme">
    <option>analogous</option><option>triadic</option><option>complementary</option><option>wide</option>
  </select>
  <button class="primary" id="run">simulate</button>
  <button id="composeBtn">composite</button>
  <button id="play">▶ audio</button>
  <button id="stop">■</button>
</header>

<main>
  <div class="stage" id="stage"><div class="badge" id="badge">— no world —</div></div>
  <div>
    <div class="panel">
      <h2 id="worldTitle">world</h2>
      <div class="swatches" id="swatches"></div>
      <div id="meta" class="receipt"></div>
    </div>
    <div class="panel">
      <h2>reasoning · per-axis margins (accepted)</h2>
      <div id="axes"></div>
    </div>
    <div class="panel">
      <h2>witnessed motion · timeline</h2>
      <div id="timeline" class="receipt">—</div>
    </div>
    <div class="panel">
      <h2>receipt · proof before trust</h2>
      <div id="receipt" class="receipt">—</div>
    </div>
  </div>
</main>
<div class="gallery" id="gallery"></div>
<div class="panel" style="margin:0 20px 24px"><h2>log</h2><div id="log"></div></div>

<script>
"use strict";
const $ = s => document.querySelector(s);
const base = () => $("#base").value.replace(/\/$/, "");
const GENS = ["phyllotaxis","gyroid","quasicrystal","attractor","harmonograph",
              "flowfield","metaballs","turbulence","rings","moire"];
let RAF = 0, AUDIO = null;

function log(msg, err){ const el=$("#log"); el.innerHTML += `<span class="${err?'err':''}">`+msg+"</span>\n"; el.scrollTop=el.scrollHeight; }
async function getJSON(path){ const r=await fetch(base()+path); if(!r.ok) throw new Error(path+" -> "+r.status); return r.json(); }
async function postJSON(path,body){ const r=await fetch(base()+path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok) throw new Error(path+" -> "+r.status); return r.json(); }

// ---------- a tiny evaluator for the recipe's GLSL-subset expression strings ----------
// grammar matches strand.glsl emit: + - * , unary -, parens, numbers, vars x/y/t,
// funcs sin cos exp abs sqrt, and safediv(a,b). No '/' operator is ever emitted.
function makeEval(src){
  const s=src.replace(/\s+/g,""); let i=0;
  const peek=()=>s[i]||"";
  const F={sin:Math.sin,cos:Math.cos,exp:Math.exp,abs:Math.abs,sqrt:x=>x>0?Math.sqrt(x):0};
  function sum(env){ let v=term(env); while(peek()==="+"||peek()==="-"){const o=s[i++]; const r=term(env); v=o==="+"?v+r:v-r;} return v; }
  function term(env){ let v=atom(env); while(peek()==="*"){i++; v*=atom(env);} return v; }
  function atom(env){
    const c=peek();
    if(c==="("){ i++; let neg=false; if(peek()==="-"){i++;neg=true;} const v=sum(env); i++; return neg?-v:v; }
    if(/[a-z]/i.test(c)){ let j=i; while(/[a-z0-9]/i.test(peek()))i++; const id=s.slice(j,i);
      if(peek()==="("){ i++; const a=sum(env); if(peek()===","){i++; const b=sum(env); i++; const d=Math.abs(b)>1e-3?b:(b>=0?1e-3:-1e-3); return a/d;} i++; return F[id](a); }
      return env[id]||0; }
    let j=i; while(/[0-9.eE+\-]/.test(peek())){ if((peek()==="+"||peek()==="-")&&i>j&&!/[eE]/.test(s[i-1]))break; i++; }
    return parseFloat(s.slice(j,i));
  }
  return env=>{ i=0; return sum(env); };
}

// ---------- WebGL field render: compile render_program.source VERBATIM ----------
const VERT="attribute vec2 p;void main(){gl_Position=vec4(p,0.0,1.0);}";
function hexToRGB(h){ h=h.replace("#",""); return [parseInt(h.slice(0,2),16)/255,parseInt(h.slice(2,4),16)/255,parseInt(h.slice(4,6),16)/255]; }
function compile(gl,type,src){ const sh=gl.createShader(type); gl.shaderSource(sh,src); gl.compileShader(sh);
  if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(sh)); return sh; }

function renderField(canvas, rp){
  const gl=canvas.getContext("webgl")||canvas.getContext("experimental-webgl");
  if(!gl) throw new Error("no WebGL");
  const prog=gl.createProgram();
  gl.attachShader(prog,compile(gl,gl.VERTEX_SHADER,VERT));
  gl.attachShader(prog,compile(gl,gl.FRAGMENT_SHADER,rp.source));
  gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog,gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(prog));
  gl.useProgram(prog);
  const buf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
  const loc=gl.getAttribLocation(prog,"p"); gl.enableVertexAttribArray(loc); gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
  const pal=((rp.uniforms.u_palette&&rp.uniforms.u_palette.value)||[]).flatMap(hexToRGB);
  const vr=rp.value_range||[-1,1];
  const period=(rp.domain&&rp.domain.period)||1.0, animatable=!(rp.domain&&rp.domain.animatable===false);
  const U=n=>gl.getUniformLocation(prog,n);
  function frame(ts){
    const w=canvas.clientWidth, h=canvas.clientHeight; if(canvas.width!==w){canvas.width=w;canvas.height=h;}
    gl.viewport(0,0,canvas.width,canvas.height);
    gl.uniform2f(U("u_resolution"),canvas.width,canvas.height);
    gl.uniform2f(U("u_value_range"),vr[0],vr[1]);
    if(pal.length) gl.uniform3fv(U("u_palette[0]"),new Float32Array(pal));
    gl.uniform1f(U("u_time"),animatable?((ts/1000)%period):0.0);
    gl.drawArrays(gl.TRIANGLES,0,3);
    RAF=requestAnimationFrame(frame);
  }
  RAF=requestAnimationFrame(frame);
}

// ---------- Canvas2D point render from a recipe ----------
function recipePoints(r){
  const out=[]; const m=r.mode;
  if(m==="spiral"){ const a=r.angle_deg*Math.PI/180; for(let i=0;i<r.count;i++){ const rr=r.scale*Math.sqrt(i); out.push([rr*Math.cos(i*a),rr*Math.sin(i*a),i]); } }
  else if(m==="iterated"){ const ux=makeEval(r.update_x),uy=makeEval(r.update_y); let x=r.init[0],y=r.init[1],idx=0;
    for(let step=0;step<r.count;step++){ const nx=ux({x,y}),ny=uy({x,y}); x=nx;y=ny; if(step<r.transient)continue; out.push([x,y,idx++]); } }
  else if(m==="parametric"){ const ex=makeEval(r.x),ey=makeEval(r.y),n=Math.max(2,r.count);
    for(let i=0;i<n;i++){ const t=r.t_max*i/(n-1); out.push([ex({t}),ey({t}),i]); } }
  return out;
}
function renderPoints(canvas, rp, palette){
  const g=canvas.getContext("2d"); const W=canvas.width=canvas.clientWidth, H=canvas.height=canvas.clientHeight;
  g.clearRect(0,0,W,H);
  const pts=recipePoints(rp.recipe); if(!pts.length)return;
  const xs=pts.map(p=>p[0]),ys=pts.map(p=>p[1]);
  const minx=Math.min(...xs),maxx=Math.max(...xs),miny=Math.min(...ys),maxy=Math.max(...ys);
  const sp=Math.max(maxx-minx,maxy-miny,1e-6), pad=W*0.08, sc=(W-2*pad)/sp;
  const ox=(W-(maxx-minx)*sc)/2-minx*sc, oy=(H-(maxy-miny)*sc)/2-miny*sc;
  for(const [x,y,i] of pts){ g.fillStyle=palette[Math.floor(i/pts.length*palette.length)%palette.length]||"#e8e8f0";
    g.beginPath(); g.arc(ox+x*sc,oy+y*sc,1.5,0,7); g.fill(); }
}

// ---------- audio: synthesize from audio_program ----------
function playAudio(ap){
  stopAudio();
  const Ctx=window.AudioContext||window.webkitAudioContext; if(!Ctx){log("no Web Audio",true);return;}
  AUDIO=new Ctx(); const dur=4.0, t0=AUDIO.currentTime;
  const master=AUDIO.createGain(); master.connect(AUDIO.destination);
  const env=ap.envelope||{attack:0.18,release:0.30};
  master.gain.setValueAtTime(0,t0);
  master.gain.linearRampToValueAtTime(0.9,t0+dur*(env.attack||0.18));
  master.gain.setValueAtTime(0.9,t0+dur*(1-(env.release||0.3)));
  master.gain.linearRampToValueAtTime(0,t0+dur);
  const curve=ap.pitch_curve&&ap.pitch_curve.length?ap.pitch_curve:[ap.base_freq||220];
  for(const o of (ap.oscillators||[])){
    const osc=AUDIO.createOscillator(), g=AUDIO.createGain();
    g.gain.value=o.gain||0.2; osc.connect(g); g.connect(master);
    const fc=new Float32Array(curve.map(f=>Math.max(20,f*(o.harmonic||1))));
    try{ osc.frequency.setValueCurveAtTime(fc,t0,dur); }catch(e){ osc.frequency.value=fc[0]; }
    osc.start(t0); osc.stop(t0+dur);
  }
  log("♪ playing "+(ap.oscillators||[]).length+" partials, sweep "+curve.length+" steps");
}
function stopAudio(){ if(AUDIO){try{AUDIO.close();}catch(e){} AUDIO=null;} }

// ---------- render a World into the stage ----------
function clearStage(){ if(RAF){cancelAnimationFrame(RAF);RAF=0;} const s=$("#stage");
  [...s.querySelectorAll("canvas,.svgwrap")].forEach(n=>n.remove()); }
function blendCSS(b){ return b==="add"?"lighten":(["screen","multiply","normal"].includes(b)?b:"normal"); }

function renderLayer(layer, palette){
  const s=$("#stage"); const rp=layer.render_program;
  if(rp.target==="glsl-fragment"){
    const c=document.createElement("canvas"); c.style.mixBlendMode=blendCSS(layer.blend); s.appendChild(c);
    try{ renderField(c,rp); }
    catch(e){ log("shader fail ("+layer.organ_id+"): "+e.message,true); c.remove();
      if(layer.preview){ const d=document.createElement("div"); d.className="svgwrap"; d.innerHTML=layer.preview.content;
        const svg=d.querySelector("svg"); if(svg){svg.setAttribute("width","100%");svg.setAttribute("height","100%");} s.appendChild(d);} }
  }else{
    const c=document.createElement("canvas"); c.style.mixBlendMode=blendCSS(layer.blend); s.appendChild(c);
    requestAnimationFrame(()=>renderPoints(c,rp,palette));
  }
}

function showWorld(w){
  clearStage(); stopAudio(); window.__world=w;
  const pal=w.palette||[];
  if(pal[2])document.documentElement.style.setProperty("--a",pal[2]);
  if(pal[3])document.documentElement.style.setProperty("--b",pal[3]);
  if(pal[4])document.documentElement.style.setProperty("--c",pal[4]);
  $("#worldTitle").textContent=w.title||"world";
  $("#swatches").innerHTML=pal.map(c=>`<i style="background:${c}"></i>`).join("");
  $("#badge").textContent=w.layers.map(l=>l.organ_id+"·"+l.render_program.target.split("-")[0]).join("  +  ");
  [...w.layers].sort((a,b)=>a.z-b.z).forEach(l=>renderLayer(l,pal));
  const t=w.trajectory, acc=t.steps[t.accepted_index]||t.steps[t.steps.length-1]||{margins:{}};
  $("#axes").innerHTML=Object.entries(acc.margins||{}).map(([k,v])=>
    `<div class="axis ${k===acc.weakest?'weak':''}"><span class="name">${k}</span>`+
    `<span class="bar"><span class="fill" style="width:${Math.round(v*100)}%"></span></span>`+
    `<span class="val">${v.toFixed(3)}</span></div>`).join("")||"<div class=receipt>—</div>";
  const tl=w.timeline;
  $("#timeline").innerHTML = tl ? (
    `period ${tl.period}s<br>`+
    `continuity <span class="tag ${tl.continuity.tag}">${tl.continuity.tag}</span> ${tl.continuity.score}<br>`+
    `on-criterion <span class="tag ${tl.on_criterion.tag}">${tl.on_criterion.tag}</span> ${tl.on_criterion.score}`
  ) : "static (this generator is not animatable in v1)";
  $("#meta").innerHTML = (w.composition?`composition <span class="tag ${w.composition.tag}">${w.composition.tag}</span> ${w.composition.score}<br>`:"")
    + `converged: ${t.converged} · final score ${w.receipt.final_score}`;
  const r=w.receipt;
  $("#receipt").innerHTML=`id ${r.scene_id}<br>seed ${r.seed} · organs ${r.organ_ids.join(", ")}<br>`+
    `expr sha: ${r.artifact_shas.join(" · ")}`;
  log("world "+w.id+" ("+w.layers.length+" layer"+(w.layers.length>1?"s":"")+")");
}

// ---------- wiring ----------
GENS.forEach(g=>{ const o=document.createElement("option"); o.textContent=g; $("#gen").appendChild(o); });
$("#gen").value="gyroid";

async function loadGallery(){
  try{ const d=await getJSON("/gallery"); $("#gallery").innerHTML="";
    d.scenes.forEach(s=>{ const el=document.createElement("div"); el.className="card";
      el.innerHTML=`<div class="t">${s.title}</div><div class="m">${s.generator} · ${s.converged?"✓":"~"} ${s.score}</div>`+
        `<div class="strip">${(s.palette||[]).map(c=>`<i style="background:${c}"></i>`).join("")}</div>`;
      el.onclick=async()=>{ try{ showWorld(await getJSON("/scene/"+s.id)); }catch(e){log(e.message,true);} };
      $("#gallery").appendChild(el); });
    log("gallery: "+d.scenes.length+" worlds");
  }catch(e){ log("gallery failed: "+e.message+" (is the server running?)",true); }
}
$("#run").onclick=async()=>{ try{ showWorld(await postJSON("/simulate",
  {seed:+$("#seed").value,generator:$("#gen").value,scheme:$("#scheme").value})); }catch(e){log(e.message,true);} };
$("#composeBtn").onclick=async()=>{ try{ showWorld(await postJSON("/compose",
  {seed:+$("#seed").value,organs:["gyroid","phyllotaxis"],scheme:$("#scheme").value})); }catch(e){log(e.message,true);} };
$("#play").onclick=()=>{ const w=window.__world; if(w&&w.audio_program)playAudio(w.audio_program); else log("no audio_program",true); };
$("#stop").onclick=stopAudio;

loadGallery();
</script>
</body>
</html>
